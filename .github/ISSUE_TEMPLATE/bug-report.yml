name: Bug Report
description: Create a report to help us improve
title: "[Bug]: "
labels: ["bug"]
assignees:
  - kings1990
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: |-
        Make SURE that you follow these statements.
      options:
        - label: I use plugin version 2021.1.4+
          required: true

        - label: I have license of Restful Fast Request
          required: true

        - label: I followed the docs and I double checked my configuration.
          required: true

        - label: I have searched [FAQ](https://api-buddy.com/guide/faq.html) and I did not find the answer.
          required: true
  - type: checkboxes
    id: operating-systems
    attributes:
      label: Which operating system are you using?
      description: You may select more than one. Don’t select anything if it's not about the environment.
      options:
        - label: macOS
        - label: Windows
        - label: Linux  
    validations:
      required: true
  - type: input
    id: ideaVersion
    attributes:
      label: IDEA version
      value: 
    validations:
      required: true
  - type: input
    id: pluginVersion
    attributes:
      label: Plugin version
      value: 
      placeholder: version of Restful Fast Request
    validations:
      required: true
                  
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true
  
    validations:
      required: true
  
  - type: textarea
    id: logs
    attributes:
      label: Error log
      description: Please copy and paste error log . This will help us better find and solve problems


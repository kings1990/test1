name: Bug Report
description: Create a report to help us improve
title: "[Bug]: "
labels: ["bug"]
assignees:
  - kings1990
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: |-
        Make SURE that you follow these statements.
      options:
        - label: I use plugin version 2021.1.4+
          required: true

        - label: I have license of Restful Fast Request
          required: true

        - label: I followed the [docs](https://api-buddy.com) and I double checked my configuration.
          required: true

        - label: I have searched [FAQ](https://api-buddy.com/guide/faq.html) and I did not find the answer.
          required: true

        - label: I have searched closed issue and I did not find the answer.
          required: true  
  - type: checkboxes
    id: operating-systems
    attributes:
      label: Which operating system are you using?
      options:
        - label: macOS
        - label: Windows
        - label: Linux  
    validations:
      required: true
  - type: input
    id: ideaVersion
    attributes:
      label: IDEA version
      value: 
    validations:
      required: true
  - type: input
    id: pluginVersion
    attributes:
      label: Plugin version
      value: 
      placeholder: version of Restful Fast Request
    validations:
      required: true
         
  - type: markdown
    attributes:
      value: |
        ## Describe the bug

        > If applicable, add screenshots and log to help explain your problem.                
  - type: textarea
    id: description
    attributes:
      label: 
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  
  - type: textarea
    id: logs
    attributes:
      label: Error log
      description: Please copy and paste error log . This will help us better find and solve problems

